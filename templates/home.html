<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e0e0e6;
      --accent: #4f46e5;
      --accent-dim: rgba(79,70,229,0.08);
      --text: #111118;
      --muted: #6b6b80;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(245,245,247,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 120px;
      text-align: center;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    /* Search */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 460px;
    }

    .city-search {
      width: 100%;
      padding: 14px 18px 14px 46px;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .city-search:focus {
      border-color: var(--accent);
      box-shadow: 0 2px 20px rgba(79,70,229,0.12);
    }

    .city-search::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 1.1rem;
    }

    /* Dropdown */
    .city-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 50;
      display: none;
    }

    .city-dropdown.open { display: block; }

    .dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
      color: inherit;
    }

    .dropdown-item:hover, .dropdown-item.focused {
      background: var(--accent-dim);
    }

    .dropdown-city-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .dropdown-city-count {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .dropdown-empty {
      padding: 14px 18px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }

    .dropdown-section-label {
      padding: 8px 18px 4px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">city<span>events</span></div>
</header>

<div class="hero">
  <h1>Find events near you</h1>
  <p>Real-time listings from local sources — pick your city.</p>

  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">&#128205;</span>
    <input
      class="city-search"
      id="citySearch"
      type="text"
      placeholder="Search for a city..."
      autocomplete="off"
      aria-label="Search cities"
    />
    <div class="city-dropdown" id="cityDropdown" role="listbox"></div>
  </div>
</div>

<script>
  const CITIES = [
    {% for city in cities %}
    { name: {{ city.name | tojson }}, count: {{ city.count }}, slug: {{ city.slug | tojson }} },
    {% endfor %}
  ];

  const input = document.getElementById('citySearch');
  const dropdown = document.getElementById('cityDropdown');
  const wrap = document.getElementById('searchWrap');
  let focusedIndex = -1;

  function renderDropdown(query) {
    const q = query.trim().toLowerCase();
    const filtered = q
      ? CITIES.filter(c => c.name.toLowerCase().includes(q))
      : CITIES;

    focusedIndex = -1;

    if (CITIES.length === 0) {
      dropdown.innerHTML = '<div class="dropdown-empty">No cities available yet — check back after the first scrape.</div>';
      return;
    }

    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="dropdown-empty">No cities match "<strong>' + escHtml(query) + '</strong>"</div>';
      return;
    }

    const label = q ? '' : '<div class="dropdown-section-label">Available cities</div>';
    const items = filtered.map((c, i) => `
      <a class="dropdown-item" href="/city/${escHtml(c.slug)}" role="option" data-index="${i}">
        <span class="dropdown-city-name">${escHtml(c.name)}</span>
        <span class="dropdown-city-count">${c.count} event${c.count !== 1 ? 's' : ''}</span>
      </a>
    `).join('');

    dropdown.innerHTML = label + items;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function open() {
    renderDropdown(input.value);
    dropdown.classList.add('open');
  }

  function close() {
    dropdown.classList.remove('open');
    focusedIndex = -1;
  }

  function getItems() {
    return [...dropdown.querySelectorAll('.dropdown-item')];
  }

  function moveFocus(dir) {
    const items = getItems();
    if (!items.length) return;
    items.forEach(i => i.classList.remove('focused'));
    focusedIndex = Math.max(0, Math.min(items.length - 1, focusedIndex + dir));
    items[focusedIndex].classList.add('focused');
    items[focusedIndex].scrollIntoView({ block: 'nearest' });
  }

  input.addEventListener('focus', open);
  input.addEventListener('input', () => {
    renderDropdown(input.value);
    dropdown.classList.add('open');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
    else if (e.key === 'Enter') {
      const items = getItems();
      if (focusedIndex >= 0 && items[focusedIndex]) {
        window.location.href = items[focusedIndex].href;
      } else if (items.length === 1) {
        window.location.href = items[0].href;
      }
    }
    else if (e.key === 'Escape') { close(); input.blur(); }
  });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) close();
  });
</script>

</body>
</html>
