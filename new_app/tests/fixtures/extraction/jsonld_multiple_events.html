<!DOCTYPE html>
<html>
<head>
<title>Multiple Events</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "MusicEvent",
      "name": "Symphony Under the Stars",
      "startDate": "2025-07-04",
      "url": "https://example.com/events/symphony",
      "location": {"@type": "Place", "name": "Riverside Amphitheater", "address": "1 River Rd"}
    },
    {
      "@type": "Event",
      "name": "Food Truck Festival",
      "startDate": "2025-07-05T11:00:00",
      "endDate": "2025-07-05T20:00:00",
      "url": "https://example.com/events/food-trucks",
      "location": {"@type": "Place", "name": "Downtown Square"}
    }
  ]
}
</script>
</head>
<body></body>
</html>
