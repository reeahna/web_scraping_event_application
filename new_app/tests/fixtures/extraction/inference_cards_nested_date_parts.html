<!DOCTYPE html>
<html>
<head><title>Season Listing</title></head>
<body>
<section class="listing">
  <div class="event-card">
    <div class="date">
      <span class="weekday">Tuesday | </span>
      <span class="month">Oct </span>
      <span class="day">6</span>
      <span class="year"> , 2026</span>
    </div>
    <div class="title"><a href="/events/example-one">Example One</a></div>
  </div>
  <div class="event-card">
    <div class="date">
      <span class="weekday">Friday | </span>
      <span class="month">Nov </span>
      <span class="day">13</span>
      <span class="year"> , 2026</span>
    </div>
    <div class="title"><a href="/events/example-two">Example Two</a></div>
  </div>
  <div class="event-card">
    <div class="date">
      <span class="weekday">Saturday | </span>
      <span class="month">Mar </span>
      <span class="day">7</span>
      <span class="year"> , 2027</span>
    </div>
    <div class="title"><a href="/events/example-three">Example Three</a></div>
  </div>
  <div class="event-card">
    <div class="date">
      <span class="weekday">Thursday | </span>
      <span class="month">Apr </span>
      <span class="day">22</span>
      <span class="year"> , 2027</span>
    </div>
    <div class="title"><a href="/events/example-four">Example Four</a></div>
  </div>
</section>
</body>
</html>
